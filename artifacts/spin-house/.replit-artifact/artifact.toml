kind = "web"
previewPath = "/"
title = "Spin House Laundry"
version = "1.0.0"
id = "artifacts/spin-house"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20323

[services.development]
run = "pnpm --filter @workspace/spin-house run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spin-house", "run", "build" ]
publicDir = "artifacts/spin-house/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20323"
BASE_PATH = "/"
